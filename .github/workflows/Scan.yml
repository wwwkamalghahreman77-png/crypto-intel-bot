name: Crypto Bot Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

concurrency:
  group: crypto-bot-scan
  cancel-in-progress: false

jobs:

  run-bot:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Crypto Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TOOBIT_ACCESS_KEY: ${{ secrets.TOOBIT_ACCESS_KEY }}
          TOOBIT_SECRET_KEY: ${{ secrets.TOOBIT_SECRET_KEY }}
        run: |
          python main.py all

      - name: Save database back to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.db
          git diff --staged --quiet || git commit -m "Update bot database"
          git push
